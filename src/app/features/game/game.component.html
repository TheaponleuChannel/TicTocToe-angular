<!-- Confetti fires via effect() inside the component -->
<app-confetti></app-confetti>

<div class="game-wrapper" (click)="activeQuickPanel = null">

  <!-- ── Top bar ───────────────────────────────────────── -->
  <div class="game-topbar">
    <button class="btn-back" (click)="goMenu()">‹ MENU</button>

    <app-badge [color]="mode() === 'mp' ? 'o' : 'x'">
      {{ mode() === 'mp' ? 'ONLINE' : 'VS AI' }}
    </app-badge>

    <div class="topbar-right">
      <!-- Sound toggle -->
      <button class="btn-icon-only" (click)="toggleSound()" title="Sound">
        {{ soundOn ? '🔊' : '🔇' }}
      </button>
      <!-- How to play -->
      <button class="btn-icon-only" (click)="openGuide()" title="How to play">?</button>
      <!-- Restart (AI only) -->
      <button *ngIf="mode() === 'ai'" class="btn-icon-only" (click)="restart()" title="Restart">↺</button>
    </div>
  </div>

  <!-- ── Turn indicator ───────────────────────────────── -->
  <div class="turn-row">
    <app-turn-indicator></app-turn-indicator>

    <!-- Multiplayer: server connection pill -->
    <div *ngIf="mode() === 'mp'" class="conn-pill" [class.online]="connected()">
      <span class="conn-dot"></span>
      {{ connected() ? 'Online' : 'Disconnected' }}
    </div>
  </div>

  <!-- ── Scoreboard ────────────────────────────────────── -->
  <div style="position: relative; width: 100%; display: flex; justify-content: center;">
    <app-scoreboard></app-scoreboard>
    <!-- My Message Display -->
    <div class="my-message-bubble" *ngIf="myLastMessage()">
      {{ myLastMessage() }}
    </div>
  </div>

  <!-- ── Chat ──────────────────────────────────────────── -->
  <aside class="quick-rail" *ngIf="mode() === 'mp'" (click)="$event.stopPropagation()">
    <button class="quick-button" type="button" (click)="toggleQuickPanel('sticker')" title="Send sticker">
      <span class="sticker-icon">
        ☺
      </span>
    </button>
    <button class="quick-button" type="button" (click)="toggleQuickPanel('message')" title="Send message">
      <span class="sticker-icon">
        💬
      </span>
    </button>

    <div class="quick-popover" *ngIf="activeQuickPanel === 'sticker'">
      <button
        *ngFor="let sticker of stickers"
        class="sticker-option"
        type="button"
        (click)="sendSticker(sticker)">
        {{ sticker }}
      </button>
    </div>

    <div class="quick-popover message-popover" *ngIf="activeQuickPanel === 'message'">
      <button
        *ngFor="let message of quickMessages"
        class="message-option"
        type="button"
        (click)="sendPresetMessage(message)">
        {{ message }}
      </button>

      <form class="custom-message" (ngSubmit)="sendCustomMessage()">
        <input
          name="customMessage"
          [(ngModel)]="customMessage"
          maxlength="80"
          placeholder="Type message"
          autocomplete="off" />
        <button type="submit">SEND</button>
      </form>
    </div>
  </aside>

  <!-- ── Board ─────────────────────────────────────────── -->
  <app-board></app-board>

</div>

<!-- ── Result overlay (portal-like, fixed) ───────────── -->
<app-result-overlay
  (playAgain)="onPlayAgain()"
  (menu)="goMenu()">
</app-result-overlay>
